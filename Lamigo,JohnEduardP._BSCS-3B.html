<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CPU Scheduling Simulator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<h1>CPU Scheduling Simulator</h1>

<div class="container">

    <h2>Input Processes</h2>
    <!-- User input area for process parameters and algorithm selection -->
    <label>Number of Processes:</label>
    <input type="number" id="numProcesses" min="3" value="3">

    <button onclick="generateInputs()">Generate Inputs</button>

    <div id="processInputs"></div>
    <div id="priorityNote" style="display:none; font-size:0.95rem; color:#444; margin-top:8px;">
        Note: lower number means higher priority.
    </div>

    <label>Algorithm:</label>
    <select id="algorithm" onchange="updateVisibility()">
        <option value="fcfs">First-Come, First-Served (FCFS)</option>
        <option value="sjf">Shortest Job First (SJF) – Non-preemptive</option>
        <option value="srt">Shortest Remaining Time (SRT) – Preemptive </option>
        <option value="rr">Round Robin</option>
        <option value="prio">Priority Scheduling (Non-preemptive)</option>
        <option value="prio_rr">Priority Scheduling with Round Robin</option>
    </select>

    <label id="quantumLabel" style="display:none;">Time Quantum:</label>
    <input type="number" id="quantum" min="1" value="2" style="display:none;">

    <button onclick="runSimulation()">Run Simulation</button>

    <h2>Gantt Chart</h2>
    <div id="ganttContainer">
        <div id="gantt"></div>
        <div id="ganttLabels"></div>
    </div>

    <h2>Results</h2>
    <table id="resultTable">
        <thead id="tableHeader">
            <tr>
                <th>Process</th>
                <th>Arrival Time</th>
                <th>Burst Time</th>
                <th id="priorityHeader">Priority</th>
                <th>Waiting Time</th>
                <th>Turnaround Time</th>
                <th>Response Time</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <h3 id="averages"></h3>

</div>

<script src="utils.js"></script>
<script src="fcfs.js"></script>
<script src="sjf.js"></script>
<script src="srt.js"></script>
<script src="rr.js"></script>
<script src="priority.js"></script>
<script src="priority_rr.js"></script>
<script src="main.js"></script>
</body>
</html>
